<!--
  AllWell first-party tracking redirect service (ALL-3).
  Purpose: give every referral link a clean, first-party, trackable URL, e.g.
    https://btgamevip.com/go/?c=fb_douluo_20260711&gid=1401
  Behaviour:
    1. Read campaign label `c` (our sub-id) + `gid` + any utm_* params.
    2. Fire a GA4 `download_redirect` event so we can attribute the CLICK
       to a channel / post / campaign in GA4.
    3. 302-style client redirect to the u2 download page.
  Abuse-resistant: the destination host is HARD-CODED to qd.u2game99.com and
  `gid` is coerced to digits only, so this can never be used as an open redirect.
  Attribution note: u2 does NOT support sub-id passthrough (confirmed by CEO
  2026-07-11), so the deposit itself is attributed at the u2 channel level
  (ag=da00467). This service closes the CLICK side of the funnel; deposits are
  correlated with GA4 campaign click volume over time (approximate attribution).
-->
<script>
(function () {
  var qs = new URLSearchParams(window.location.search);
  // gid: digits only, default 1401 (斗羅大陸). Never trust arbitrary input.
  var gid = (qs.get('gid') || '1401').replace(/[^0-9]/g, '') || '1401';
  var campaign = (qs.get('c') || qs.get('utm_campaign') || 'direct').slice(0, 120);
  var dest = 'https://qd.u2game99.com/down.html?ag=da00467&gid=' + gid + '&ldy=1';

  function go(){ window.location.replace(dest); }

  // GA4 event, then redirect (with a short safety timeout so a blocked/slow
  // gtag never traps the user on this page).
  try {
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=G-VB0GS9LLLB';
    document.head.appendChild(s);
    gtag('js', new Date());
    gtag('config', 'G-VB0GS9LLLB', { anonymize_ip: true });
    gtag('event', 'download_redirect', {
      campaign: campaign,
      gid: gid,
      channel: qs.get('utm_source') || '',
      utm_medium: qs.get('utm_medium') || '',
      event_callback: go,
      event_timeout: 1200
    });
  } catch (e) { /* ignore */ }

  // Fallbacks: fire regardless after 1.2s, and immediately if JS event never returns.
  setTimeout(go, 1200);
})();
</script>
